<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>任務管理牆 | 待辦事項追蹤</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e8ecf2 0%, #dce2ea 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            padding: 2rem;
            transition: all 0.2s;
        }

        h1 {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.9rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.25rem;
            letter-spacing: -0.3px;
        }
        h1::before {
            content: "✅";
            font-size: 1.9rem;
            background: none;
            color: #4f46e5;
        }
        .sub {
            color: #6b7280;
            border-left: 4px solid #4f46e5;
            padding-left: 14px;
            margin-bottom: 28px;
            font-weight: 450;
            font-size: 0.9rem;
        }

        /* 表單卡片 - 白色區塊 */
        .form-card {
            background: #ffffff;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #eef2f6;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 0.8rem;
        }
        .form-group {
            flex: 1;
            min-width: 160px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.75rem;
            color: #374151;
            margin-bottom: 5px;
        }
        .form-group label .required {
            color: #ef4444;
        }
        input, select, textarea {
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 10px 14px;
            font-size: 0.85rem;
            transition: all 0.2s;
            font-family: inherit;
            background: #fefefe;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            background: white;
        }
        textarea {
            resize: vertical;
        }
        .btn-primary {
            background: #4f46e5;
            border: none;
            padding: 10px 28px;
            border-radius: 2rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            margin-top: 8px;
            box-shadow: 0 2px 6px rgba(79, 70, 229, 0.2);
        }
        .btn-primary:hover {
            background: #4338ca;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(79, 70, 229, 0.25);
        }

        /* 統計儀表板 - 淺灰底區塊，放在表單下方 */
        .stats-wrapper {
            background: #f8fafc;
            border-radius: 1.5rem;
            padding: 1rem 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #eef2f6;
        }
        .stats-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.8rem;
        }
        .stat-card {
            background: white;
            border-radius: 1.2rem;
            padding: 0.8rem 0.6rem;
            text-align: center;
            border: 1px solid #eef2f6;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: #ddd6fe;
        }
        .stat-number {
            font-size: 1.7rem;
            font-weight: 800;
            color: #1f2937;
            line-height: 1.2;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #6c757d;
            letter-spacing: 0.3px;
            margin-top: 4px;
        }
        .stat-card.highlight .stat-number {
            color: #4f46e5;
        }
        .progress-section {
            background: white;
            border-radius: 1.2rem;
            padding: 0.6rem 1rem;
            border: 1px solid #eef2f6;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .progress-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #374151;
            min-width: 55px;
        }
        .progress-bar-container {
            flex: 1;
            height: 6px;
            background: #e2e8f0;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #4f46e5;
            border-radius: 20px;
            width: 0%;
            transition: width 0.3s ease;
        }
        .progress-percent {
            font-size: 0.75rem;
            font-weight: 700;
            color: #4f46e5;
            min-width: 40px;
            text-align: right;
        }

        /* 過濾列 */
        .filters-bar {
            background: #f8fafc;
            border-radius: 1.8rem;
            padding: 0.7rem 1.2rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border: 1px solid #eef2f6;
        }
        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .filter-badge {
            background: white;
            padding: 6px 16px;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #334155;
            border: 1px solid #e2e8f0;
        }
        .filter-badge.active-filter {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
            box-shadow: 0 2px 6px rgba(79, 70, 229, 0.2);
        }
        .filter-badge:hover:not(.active-filter) {
            background: #e2e8f0;
        }
        .search-input {
            padding: 6px 16px;
            border-radius: 2rem;
            border: 1px solid #e2e8f0;
            font-size: 0.8rem;
            width: 220px;
            outline: none;
            transition: all 0.2s;
            background: white;
        }
        .search-input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1);
        }
        .counter-info {
            font-size: 0.75rem;
            background: white;
            padding: 5px 14px;
            border-radius: 2rem;
            color: #1f2937;
            font-weight: 500;
            border: 1px solid #e2e8f0;
        }

        /* 卡片網格 */
        .records-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.2rem;
        }
        .task-card {
            background: white;
            border-radius: 1.3rem;
            padding: 1rem;
            transition: all 0.2s;
            border: 1px solid #eef2f6;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
        }
        .task-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.12);
            border-color: #e0e7ff;
        }
        .task-card.done-card {
            background: #fafcff;
            opacity: 0.85;
            border-left: 4px solid #94a3b8;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .priority-badge {
            padding: 3px 10px;
            border-radius: 2rem;
            font-size: 0.65rem;
            font-weight: 700;
        }
        .priority-high { background: #fee2e2; color: #b91c1c; }
        .priority-medium { background: #fff3e3; color: #b45309; }
        .priority-low { background: #e0f2fe; color: #0369a1; }
        .status-badge {
            font-size: 0.65rem;
            padding: 3px 10px;
            border-radius: 2rem;
            font-weight: 600;
        }
        .status-active {
            background: #dcfce7;
            color: #15803d;
        }
        .status-done {
            background: #e2e8f0;
            color: #475569;
            text-decoration: line-through;
        }
        .task-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin: 8px 0 6px;
            color: #0f172a;
            word-break: break-word;
        }
        .task-note {
            font-size: 0.75rem;
            color: #5b6e8c;
            margin: 6px 0;
            line-height: 1.35;
            padding-left: 6px;
            border-left: 2px solid #e2e8f0;
        }
        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 0.65rem;
            color: #94a3b8;
            flex-wrap: wrap;
            gap: 5px;
            border-top: 1px solid #f0f2f5;
            padding-top: 8px;
        }
        .task-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .toggle-btn {
            background: #eef2ff;
            border: none;
            padding: 5px 12px;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            color: #4f46e5;
            flex: 1;
        }
        .toggle-btn:hover {
            background: #e0e7ff;
            transform: scale(0.97);
        }
        .empty-message {
            text-align: center;
            padding: 2rem;
            background: #fefefe;
            border-radius: 1.3rem;
            color: #7e8ba0;
            grid-column: 1 / -1;
            border: 1px dashed #cbd5e1;
            font-size: 0.85rem;
        }
        footer {
            margin-top: 1.8rem;
            text-align: center;
            font-size: 0.65rem;
            color: #9ca3af;
        }

        @media (max-width: 720px) {
            .container {
                padding: 1rem;
            }
            h1 {
                font-size: 1.5rem;
            }
            .stats-dashboard {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.6rem;
            }
            .filters-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-input {
                width: 100%;
            }
            .records-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .btn-primary {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>任務管理牆 📋</h1>
    <div class="sub">追蹤待辦事項 · 切換完成狀態 · Google Sheet 同步</div>

    <!-- 表單卡片（新增任務） -->
    <div class="form-card">
        <div class="form-row">
            <div class="form-group">
                <label>📌 任務標題 <span class="required">*</span></label>
                <input type="text" id="taskTitle" placeholder="例如：完成專案簡報" autocomplete="off">
            </div>
            <div class="form-group">
                <label>⚡ 優先級 <span class="required">*</span></label>
                <select id="taskPriority">
                    <option value="高">🔴 高優先級</option>
                    <option value="中" selected>🟡 中優先級</option>
                    <option value="低">🟢 低優先級</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>📝 備註 (可選)</label>
                <textarea id="taskNote" rows="2" placeholder="額外說明、截止日期或相關連結..."></textarea>
            </div>
        </div>
        <div style="display: flex; justify-content: flex-end;">
            <button id="submitBtn" class="btn-primary">➕ 新增任務</button>
        </div>
    </div>

    <!-- 統計儀表板（放在表單下方，淺灰底區塊） -->
    <div class="stats-wrapper">
        <div class="stats-dashboard" id="statsDashboard">
            <div class="stat-card">
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">總任務</div>
            </div>
            <div class="stat-card highlight">
                <div class="stat-number" id="statActive">0</div>
                <div class="stat-label">進行中</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statDone">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="progress-section">
                <span class="progress-label">📈 完成率</span>
                <div class="progress-bar-container">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="progress-percent" id="progressPercent">0%</span>
            </div>
        </div>
    </div>

    <!-- 過濾列 -->
    <div class="filters-bar">
        <div class="filter-group">
            <span style="font-size:0.7rem; font-weight:500;">狀態篩選：</span>
            <div data-filter-type="status" data-value="all" class="filter-badge active-filter">全部</div>
            <div data-filter-type="status" data-value="active" class="filter-badge">進行中</div>
            <div data-filter-type="status" data-value="done" class="filter-badge">已完成</div>
        </div>
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜尋標題或備註...">
        <div class="counter-info" id="counterTip">📊 即時統計</div>
    </div>

    <!-- 任務卡片顯示區 -->
    <div id="recordsContainer" class="records-grid">
        <div class="empty-message">✨ 正在同步資料... ✨</div>
    </div>
    <footer>💾 自動儲存於 Google Sheet + 瀏覽器 | 點擊按鈕切換 active / done 狀態</footer>
</div>

<script>
    // ==================== 設定區 ====================
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyqKHxLiTVnovkVv6MjSEJJ3txZWkLu3txL12Ov6KPRPMEj-hJ-xvmBM1KGVLFHY2JoKQ/exec";

    const STORAGE_KEY = "records";
    let records = [];
    let currentStatusFilter = "all";
    let currentSearchKeyword = "";

    // DOM 元素
    const container = document.getElementById("recordsContainer");
    const titleInput = document.getElementById("taskTitle");
    const prioritySelect = document.getElementById("taskPriority");
    const noteTextarea = document.getElementById("taskNote");
    const submitBtn = document.getElementById("submitBtn");
    const counterSpan = document.getElementById("counterTip");
    const searchInput = document.getElementById("searchInput");

    function escapeHtml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function persistToLocal() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function loadFromLocal() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                if (Array.isArray(parsed)) {
                    records = parsed.map(item => ({
                        id: item.id || `fallback_${Date.now()}`,
                        createdAt: item.createdAt || new Date().toISOString(),
                        status: (item.status === 'done' || item.status === 'active') ? item.status : 'active',
                        title: item.title || '(無標題)',
                        priority: ['高', '中', '低'].includes(item.priority) ? item.priority : '中',
                        note: typeof item.note === 'string' ? item.note : ''
                    }));
                } else {
                    records = [];
                }
            } catch(e) {
                records = [];
            }
        } else {
            records = [];
        }
        return records;
    }

    function normalizeRecord(sheetRecord) {
        return {
            id: sheetRecord.ID || sheetRecord.id || '',
            createdAt: sheetRecord.CreatedAt || sheetRecord.createdAt || new Date().toISOString(),
            status: (sheetRecord.Status === 'done' || sheetRecord.Status === 'active') ? sheetRecord.Status : 'active',
            title: sheetRecord.Title || sheetRecord.title || '(無標題)',
            priority: (sheetRecord.Priority === '高' || sheetRecord.Priority === '中' || sheetRecord.Priority === '低') ? sheetRecord.Priority : '中',
            note: sheetRecord.Note || sheetRecord.note || ''
        };
    }

    async function fetchRecordsFromSheet() {
        try {
            const response = await fetch(APPS_SCRIPT_URL);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const data = await response.json();
            if (data.ok && Array.isArray(data.records)) {
                return data.records.map(normalizeRecord);
            } else {
                throw new Error(data.error || 'Invalid response');
            }
        } catch (err) {
            console.warn('Failed to fetch from Sheet:', err);
            return null;
        }
    }

    async function syncToSheet(payload) {
        try {
            const response = await fetch(APPS_SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(payload)
            });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const result = await response.json();
            if (!result.ok) {
                console.error('Sheet sync error:', result.error);
                return false;
            }
            return true;
        } catch (err) {
            console.error('Network error during sync:', err);
            return false;
        }
    }

    function createRecord(formData) {
        const { title, priority, note } = formData;
        if (!title || title.trim() === "") {
            alert("請填寫任務標題！");
            return null;
        }
        return {
            id: Date.now() + '-' + Math.random().toString(36).substring(2, 10),
            createdAt: new Date().toISOString(),
            status: "active",
            title: title.trim(),
            priority: priority,
            note: note || ""
        };
    }

    async function saveData(record) {
        if (!record) return false;
        records.unshift(record);
        persistToLocal();
        renderList();
        await syncToSheet({ action: "create", record: record });
        return true;
    }

    async function updateRecord(id, changes) {
        const index = records.findIndex(r => r.id === id);
        if (index === -1) return false;
        records[index] = { ...records[index], ...changes };
        persistToLocal();
        renderList();
        await syncToSheet({ action: "update", id: id, changes: changes });
        return true;
    }

    async function loadData() {
        const sheetRecords = await fetchRecordsFromSheet();
        if (sheetRecords !== null) {
            records = sheetRecords;
            persistToLocal();
            return records;
        } else {
            console.warn('Using localStorage fallback');
            loadFromLocal();
            return records;
        }
    }

    function renderStatsDashboard() {
        const total = records.length;
        const active = records.filter(r => r.status === "active").length;
        const done = records.filter(r => r.status === "done").length;
        const completionRate = total === 0 ? 0 : Math.round((done / total) * 100);
        
        const statTotal = document.getElementById("statTotal");
        const statActive = document.getElementById("statActive");
        const statDone = document.getElementById("statDone");
        const progressFill = document.getElementById("progressFill");
        const progressPercent = document.getElementById("progressPercent");
        
        if (statTotal) statTotal.innerText = total;
        if (statActive) statActive.innerText = active;
        if (statDone) statDone.innerText = done;
        if (progressFill) progressFill.style.width = `${completionRate}%`;
        if (progressPercent) progressPercent.innerText = `${completionRate}%`;
    }

    function renderList(recordsToShow) {
        let dataToRender = recordsToShow;
        if (dataToRender === undefined) {
            let filtered = [...records];
            if (currentStatusFilter === "active") {
                filtered = filtered.filter(r => r.status === "active");
            } else if (currentStatusFilter === "done") {
                filtered = filtered.filter(r => r.status === "done");
            }
            
            if (currentSearchKeyword.trim() !== "") {
                const keyword = currentSearchKeyword.trim().toLowerCase();
                filtered = filtered.filter(task => 
                    task.title.toLowerCase().includes(keyword) || 
                    task.note.toLowerCase().includes(keyword)
                );
            }
            dataToRender = filtered;
        }
        
        const sorted = [...dataToRender].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        if (sorted.length === 0) {
            container.innerHTML = `<div class="empty-message">📭 沒有符合條件的任務，新增一筆吧！</div>`;
            counterSpan.innerText = `📊 共 0 筆任務 | 總數 ${records.length}`;
            renderStatsDashboard();
            return;
        }
        
        let html = "";
        for (const task of sorted) {
            const isDone = task.status === "done";
            const cardClass = isDone ? "done-card" : "";
            const statusText = isDone ? "✅ 已完成" : "⚡ 進行中";
            const statusClass = isDone ? "status-done" : "status-active";
            let priorityClass = "";
            if (task.priority === "高") priorityClass = "priority-high";
            else if (task.priority === "中") priorityClass = "priority-medium";
            else priorityClass = "priority-low";
            
            let displayDate = "未知時間";
            try {
                const dateObj = new Date(task.createdAt);
                displayDate = `${dateObj.getFullYear()}/${dateObj.getMonth()+1}/${dateObj.getDate()} ${dateObj.getHours().toString().padStart(2,'0')}:${dateObj.getMinutes().toString().padStart(2,'0')}`;
            } catch(e) { displayDate = task.createdAt.substring(0,16); }
            
            const noteHtml = task.note ? `<div class="task-note">📎 ${escapeHtml(task.note)}</div>` : "";
            html += `
                <div class="task-card ${cardClass}" data-id="${task.id}">
                    <div class="card-header">
                        <span class="priority-badge ${priorityClass}">${task.priority} 優先</span>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                    <div class="task-title">📌 ${escapeHtml(task.title)}</div>
                    ${noteHtml}
                    <div class="task-meta">
                        <span>🕒 ${displayDate}</span>
                        <span>#${task.id.slice(-6)}</span>
                    </div>
                    <div class="task-actions">
                        <button class="toggle-btn" data-id="${task.id}" data-action="toggle">${isDone ? '🔄 恢復 active' : '✔️ 標記完成'}</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        counterSpan.innerText = `📊 顯示 ${sorted.length} 筆 | 總共 ${records.length} 筆任務`;
        renderStatsDashboard();
        
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                const targetTask = records.find(r => r.id === id);
                if (targetTask) {
                    const newStatus = targetTask.status === "active" ? "done" : "active";
                    await updateRecord(id, { status: newStatus });
                }
            });
        });
    }

    async function handleAddTask() {
        const title = titleInput.value;
        const priority = prioritySelect.value;
        const note = noteTextarea.value;
        const formData = { title, priority, note };
        const newRecord = createRecord(formData);
        if (!newRecord) return;
        await saveData(newRecord);
        titleInput.value = "";
        noteTextarea.value = "";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setupFilters() {
        const statusFilters = document.querySelectorAll('[data-filter-type="status"]');
        statusFilters.forEach(el => {
            el.addEventListener('click', () => {
                currentStatusFilter = el.getAttribute('data-value');
                statusFilters.forEach(btn => btn.classList.remove('active-filter'));
                el.classList.add('active-filter');
                renderList();
            });
        });
    }

    function setupSearch() {
        if (!searchInput) return;
        searchInput.addEventListener('input', (e) => {
            currentSearchKeyword = e.target.value;
            renderList();
        });
    }

    async function init() {
        await loadData();
        renderList();
        renderStatsDashboard();
        setupFilters();
        setupSearch();
        submitBtn.addEventListener('click', handleAddTask);
        titleInput.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                handleAddTask();
            }
        });
        noteTextarea.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                handleAddTask();
            }
        });
    }

    init();
</script>
</body>
</html>
